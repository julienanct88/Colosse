      var i=0;
      function tryNext(){
        if(i>=urls.length){reject(new Error(name+' failed'));return}
        var s=document.createElement('script');s.crossOrigin='anonymous';s.src=urls[i];
        s.onload=function(){if(check()){resolve()}else{i++;tryNext()}};

        document.head.appendChild(s);
      }

/* ═══ WAKE LOCK ═══ */
function useWakeLock(on){
  const wl=useRef(null);const vid=useRef(null);
  useEffect(()=>{
    if(!on)return;let ok=true;
    if("wakeLock"in navigator){
      const req=async()=>{try{wl.current=await navigator.wakeLock.request("screen");wl.current.addEventListener("release",()=>{if(ok)req()})}catch(e){}};
      req();const vis=()=>{if(document.visibilityState==="visible"&&ok)req()};
      document.addEventListener("visibilitychange",vis);
      return()=>{ok=false;document.removeEventListener("visibilitychange",vis);if(wl.current)wl.current.release().catch(()=>{})};
    }
    try{
      var v=document.createElement("video");v.setAttribute("playsinline","");v.setAttribute("muted","");v.muted=true;v.setAttribute("loop","");
      v.style.cssText="position:fixed;top:-1px;left:-1px;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1";
      v.src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAFxtZGF0AAAAMGWIhAAV//73ye/Apuv5LYQAM8KJMo/5FhkTwQ0GHjBhAHvgAAAPaGliZXJ0AAAADmRhdGEAAAAA5wAAAAAbsp+AEcARwE+ACcBvgFEAAAAOZGF0YQAAAADGAAAA";
      document.body.appendChild(v);var pa=function(){v.play().catch(function(){})};pa();
      document.addEventListener("touchstart",pa,{once:true});document.addEventListener("click",pa,{once:true});
      vid.current=v;return()=>{ok=false;if(vid.current){vid.current.pause();vid.current.remove();vid.current=null}};
    }catch(e){}
  },[on]);
}

function getWeekDates(wNum){
  var s1Thu=new Date(2026,0,29);
  var thu=new Date(s1Thu.getTime()+(wNum-1)*7*24*60*60*1000);
  var mon=new Date(thu.getTime()-3*24*60*60*1000);
  var mo=["jan","fév","mars","avr","mai","juin","juil","août","sept","oct","nov","déc"];
  var out=[];
  for(var i=0;i<6;i++){var d=new Date(mon.getTime()+i*24*60*60*1000);out.push(d.getDate()+" "+mo[d.getMonth()])}
  return out;
}

function mkS(n){var a=[];for(var i=0;i<n;i++)a.push({w:"",r:"",d:false});return a}
function emptyW(){
  var ds={};DAYS.forEach(function(day){var o={};day.exs.forEach(function(ex){o[ex.id]={s:mkS(ex.sets),tw:"",tr:""}});ds[day.key]=o});
  var ms={};MEAS.forEach(function(m){ms[m.id]=""});
  return{ds:ds,ms:ms,nt:"",mood:""};
}
function buildS1(){
  var w=emptyW();
  Object.keys(S1).forEach(function(eid){
    DAYS.forEach(function(day){
      if(!w.ds[day.key][eid])return;
      var raw=S1[eid],sets=[];
      raw.forEach(function(s){sets.push({w:s[0]>0?String(s[0]):"",r:String(s[1]),d:true})});
      var tgt=4;day.exs.forEach(function(e){if(e.id===eid)tgt=e.sets});
      while(sets.length<tgt)sets.push({w:"",r:"",d:false});
      w.ds[day.key][eid]={s:sets,tw:"",tr:""};
    });
  });
  Object.keys(S1M).forEach(function(k){w.ms[k]=S1M[k]});
  w.nt="S1 Réactivation — Reprise en douceur.";
  return w;
}
function migrateData(st){
  if(!st||!st.wk)return st;var changed=false;
  if(!st.migV2){
    var mwk=["pushA","pullA","legsA"];
    function dhd(ds,dk){if(!ds||!ds[dk])return false;var f=false;Object.keys(ds[dk]).forEach(function(eid){var ex=ds[dk][eid];if(ex&&ex.s)ex.s.forEach(function(s){if(s.d&&s.w&&parseFloat(s.w)>0)f=true})});return f}
    for(var n=11;n>=1;n--){var src=st.wk[n];if(!src||!src.ds)continue;if(!st.wk[n+1])st.wk[n+1]=emptyW();var dst=st.wk[n+1];if(!dst.ds)dst.ds={};
      mwk.forEach(function(dk){if(!dhd(src.ds,dk))return;if(dhd(dst.ds,dk))return;dst.ds[dk]=JSON.parse(JSON.stringify(src.ds[dk]));var dd=DAYS.find(function(d){return d.key===dk});if(dd){src.ds[dk]={};dd.exs.forEach(function(ex){src.ds[dk][ex.id]={s:mkS(ex.sets),tw:"",tr:""}})}changed=true})}
    st.migV2=true;changed=true;
  }
  Object.keys(st.wk).forEach(function(wn){
    var wd=st.wk[wn];if(!wd||!wd.ds)return;
    DAYS.forEach(function(day){
      if(!wd.ds[day.key])wd.ds[day.key]={};
      day.exs.forEach(function(ex){
        if(!wd.ds[day.key][ex.id]){wd.ds[day.key][ex.id]={s:mkS(ex.sets),tw:"",tr:""};changed=true}
        var cur=wd.ds[day.key][ex.id];
        if(cur.s.length<ex.sets){while(cur.s.length<ex.sets)cur.s.push({w:"",r:"",d:false});changed=true}
      });
    });
    if(!wd.ms){wd.ms={};MEAS.forEach(function(m){wd.ms[m.id]=""});changed=true}
    else{MEAS.forEach(function(m){if(typeof wd.ms[m.id]==="undefined"){wd.ms[m.id]="";changed=true}})}
    if(typeof wd.nt==="undefined"){wd.nt="";changed=true}
    if(typeof wd.mood==="undefined"){wd.mood="";changed=true}
  });
  if(!st.ord){st.ord={};DAYS.forEach(function(d){st.ord[d.key]=d.exs.map(function(e){return e.id})});changed=true}
  else{DAYS.forEach(function(d){if(!st.ord[d.key])st.ord[d.key]=d.exs.map(function(e){return e.id});else{d.exs.forEach(function(e){if(st.ord[d.key].indexOf(e.id)===-1){st.ord[d.key].push(e.id);changed=true}})}})}
  if(changed)save(st);return st;
}

function compObj(exDef,prev,rng){
  if(!prev||!rng)return null;
  var dn=prev.s.filter(function(s){return s.d&&s.w&&parseFloat(s.w)>0});
  if(!dn.length)return null;
  var last=dn[dn.length-1],lW=parseFloat(last.w)||0,lR=parseInt(last.r)||0;
  if(!lW)return null;
  var inc=INC[exDef.tp]||2.5;
  if(lR>=rng.hi)return{w:String(lW+inc),r:String(rng.lo)};
  return{w:String(lW),r:String(Math.min(lR+1,rng.hi))};
}

/* ═══ PR ALL-TIME ═══ */
function getAllTimeBest(exId,allWks,currentWkNum){
  var best=0;
  for(var i=1;i<currentWkNum;i++){
    var wd=allWks[i];if(!wd||!wd.ds)continue;
    DAYS.forEach(function(day){
      if(!wd.ds[day.key]||!wd.ds[day.key][exId])return;
      var d=wd.ds[day.key][exId];
      if(d.s)d.s.forEach(function(s){if(s.d){var w=parseFloat(s.w||0);if(w>best)best=w}});
    });
  }
  return best;
}

/* ═══ VOLUME SESSION ═══ */
function calcVol(dData,exs){
  var t=0;exs.forEach(function(ex){var d=dData[ex.id];if(!d||!d.s)return;d.s.forEach(function(s){if(s.d&&s.w&&s.r)t+=(parseFloat(s.w)||0)*(parseInt(s.r)||0)})});
  return Math.round(t);
}

function getOrderedExs(dayDef,order){
  if(!order)return dayDef.exs;
  var locked=dayDef.exs.filter(function(e){return e.lk});
  var free=dayDef.exs.filter(function(e){return!e.lk});
  var fo=order.filter(function(id){return free.some(function(e){return e.id===id})});
  free.forEach(function(e){if(fo.indexOf(e.id)===-1)fo.push(e.id)});
  return locked.concat(fo.map(function(id){return free.find(function(e){return e.id===id})}).filter(Boolean));
}

function Timer({sec,c,onEnd,onSkip,onDC}){

  useEffect(function(){
    if(pau)return;
    if(rem<=0){
      try{if(!au.current)au.current=new(window.AudioContext||window.webkitAudioContext)();var x=au.current;[[0,660],[.15,880],[.3,1100]].forEach(function(pair){var o=x.createOscillator(),g=x.createGain();o.connect(g);g.connect(x.destination);o.frequency.value=pair[1];g.gain.setValueAtTime(.25,x.currentTime+pair[0]);g.gain.exponentialRampToValueAtTime(.001,x.currentTime+pair[0]+.2);o.start(x.currentTime+pair[0]);o.stop(x.currentTime+pair[0]+.25)})}catch(e){}

    setWk(aw);setRd(getPhaseRest(PHASES[aw].p));
    var dow=now.getDay();if(dow>=1&&dow<=6)setDayI(dow-1);else setDayI(0);
  },[]);

  useEffect(function(){
    if(!st)return;
    var t=setTimeout(function(){setSav(true);save(st);setTimeout(function(){setSav(false)},500)},500);
    return function(){clearTimeout(t)};
  },[st]);

  if(!st)return<div style={{minHeight:"100vh",background:"#08080f",display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{textAlign:"center"}}><div style={{fontSize:28,marginBottom:8}}>💪</div><div style={{fontSize:12,color:"rgba(255,255,255,.3)",fontWeight:600}}>Chargement...</div></div>
  </div>;

  var wN=wk+1,ph=PHASES[wk],day=DAYS[dayI];
  if(!st.wk[wN]){var _n=JSON.parse(JSON.stringify(st));_n.wk[wN]=emptyW();setSt(_n);return null}
  var wd=st.wk[wN];
  if(!wd.ds)wd.ds={};
  if(!wd.ds[day.key]){wd.ds[day.key]={};day.exs.forEach(function(ex){wd.ds[day.key][ex.id]={s:mkS(ex.sets),tw:"",tr:""}})}
  if(!wd.ms){wd.ms={};MEAS.forEach(function(m){wd.ms[m.id]=""})}
  if(typeof wd.nt==="undefined")wd.nt="";
  if(typeof wd.mood==="undefined")wd.mood="";
  MEAS.forEach(function(m){if(typeof wd.ms[m.id]==="undefined")wd.ms[m.id]=""});

  var pw=null;
  for(var _pw=wN-1;_pw>=1;_pw--){
    var _wd=st.wk[_pw];if(!_wd||!_wd.ds||!_wd.ds[day.key])continue;
    var hd=false;day.exs.forEach(function(ex){if(_wd.ds[day.key][ex.id]&&_wd.ds[day.key][ex.id].s)_wd.ds[day.key][ex.id].s.forEach(function(s){if(s.d&&s.w&&parseFloat(s.w)>0)hd=true})});
    if(hd){pw=_wd;break}
  }
  var pmw=null;
  for(var _pm=wN-1;_pm>=1;_pm--){
    var _mw=st.wk[_pm];if(!_mw||!_mw.ms)continue;
    var hm=false;MEAS.forEach(function(m){if(_mw.ms[m.id]&&_mw.ms[m.id]!=="")hm=true});
    if(hm){pmw=_mw;break}
  }
  day.exs.forEach(function(ex){if(!wd.ds[day.key][ex.id])wd.ds[day.key][ex.id]={s:mkS(ex.sets),tw:"",tr:""}});

  function upEx(eid,f,v){setSt(function(p){var n=JSON.parse(JSON.stringify(p));var ex=n.wk[wN].ds[day.key][eid];if(f==="tw"||f==="tr"||f==="variant"){ex[f]=v}else if(f.indexOf("s_")===0){var ps=f.split("_");ex.s[parseInt(ps[1])][ps[2]]=v}return n})}
  function upM(k,v){setSt(function(p){var n=JSON.parse(JSON.stringify(p));n.wk[wN].ms[k]=v;return n})}
  function upN(v){setSt(function(p){var n=JSON.parse(JSON.stringify(p));n.wk[wN].nt=v;return n})}
  function upMood(v){setSt(function(p){var n=JSON.parse(JSON.stringify(p));n.wk[wN].mood=(n.wk[wN].mood===v?"":v);return n})}
  function reorder(dk,eid,dir){
    setSt(function(p){
      var n=JSON.parse(JSON.stringify(p));if(!n.ord)n.ord={};
      if(!n.ord[dk]){var dd=DAYS.find(function(d){return d.key===dk});n.ord[dk]=dd.exs.map(function(e){return e.id})}
      var free=n.ord[dk].filter(function(id){var dd=DAYS.find(function(d){return d.key===dk});return dd.exs.some(function(e){return e.id===id&&!e.lk})});
      var idx=free.indexOf(eid);if(idx===-1)return n;
      var si=dir==="up"?idx-1:idx+1;if(si<0||si>=free.length)return n;
      var tmp=free[idx];free[idx]=free[si];free[si]=tmp;
      var dd=DAYS.find(function(d){return d.key===dk});
      n.ord[dk]=dd.exs.filter(function(e){return e.lk}).map(function(e){return e.id}).concat(free);
      return n;
    });
  }

  var orderedExs=getOrderedExs(day,st.ord?st.ord[day.key]:null);
  var freeExs=orderedExs.filter(function(e){return!e.lk});
  var dData=wd.ds[day.key],pDData=pw?pw.ds[day.key]:null;
  var dDone=0,dTot=0;
  day.exs.forEach(function(ex){var d=dData[ex.id];if(d){dTot+=d.s.length;dDone+=d.s.filter(function(s){return s.d}).length}});
  var sessComplete=dTot>0&&dDone===dTot;
  var sessVol=calcVol(dData,day.exs);
  var isToday=(function(){var dow=new Date().getDay();return dow>=1&&dow<=6&&dayI===dow-1})();
  var weekDone=0;
  DAYS.forEach(function(d){var dd=wd.ds[d.key];if(!dd)return;var any=false,all=true;d.exs.forEach(function(ex){if(!dd[ex.id])return;if(dd[ex.id].s.some(function(s){return s.d}))any=true;else all=false});if(any&&all)weekDone++});

  var MOODS=[{v:"💀",l:"Mort"},{v:"😫",l:"Épuisé"},{v:"😐",l:"Moyen"},{v:"💪",l:"Solide"},{v:"🔥",l:"ON FIRE"}];

  return<div style={{minHeight:"100vh",background:"#08080f",color:"#fff",fontFamily:"'DM Sans',sans-serif",padding:"14px 12px 48px",maxWidth:500,margin:"0 auto"}}>

    {/* HEADER */}
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
      <div>
        <div style={{fontSize:24,fontWeight:900,letterSpacing:-1,lineHeight:1}}>COLOSSE</div>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:2,color:"rgba(255,255,255,.22)",textTransform:"uppercase",marginTop:2}}>3 500 kcal · PPL 12 sem.</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {sav&&<div style={{fontSize:9,color:"#10B981",fontWeight:700,display:"flex",alignItems:"center",gap:3}}><span style={{width:5,height:5,borderRadius:"50%",background:"#10B981",display:"inline-block"}}/>Sauvé</div>}
        <div style={{textAlign:"right",padding:"4px 10px",borderRadius:10,background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.05)"}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:16,fontWeight:800,color:weekDone>0?"#10B981":"rgba(255,255,255,.3)"}}>{weekDone}<span style={{fontSize:9,color:"rgba(255,255,255,.25)",fontWeight:400}}>/6</span></div>
          <div style={{fontSize:8,color:"rgba(255,255,255,.2)",marginTop:1}}>séances S{wN}</div>
        </div>
      </div>
    </div>

    {/* CYCLE ROADMAP — désactivé */}

    {/* WEEK SELECTOR */}
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{padding:"3px 10px",borderRadius:20,background:ph.c+"22",border:"1px solid "+ph.c+"55",fontSize:10,fontWeight:800,color:ph.c}}>S{wN}</span>
          <span style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,.5)"}}>{ph.p}</span>
        </div>
        <span style={{fontSize:9,color:"rgba(255,255,255,.25)"}}>{(PCFG[ph.p]||{}).cLo}-{(PCFG[ph.p]||{}).cHi} compo · {(PCFG[ph.p]||{}).iLo}-{(PCFG[ph.p]||{}).iHi} iso</span>
      </div>
      <div style={{fontSize:10,color:"rgba(255,255,255,.3)",fontStyle:"italic",marginBottom:8}}>{(PCFG[ph.p]||{}).desc}</div>
      <div style={{display:"flex",gap:3,justifyContent:"center",flexWrap:"wrap"}}>
        {PHASES.map(function(p,i){
          var done=i<wk;
          return<button key={i} onClick={function(){setWk(i);setRd(getPhaseRest(p.p));setSt(function(prev){var n=JSON.parse(JSON.stringify(prev));n.cw=i+1;return n})}} style={{width:34,height:34,borderRadius:10,border:wk===i?"2px solid "+p.c:"1px solid rgba(255,255,255,.06)",background:wk===i?p.c+"20":done?"rgba(255,255,255,.04)":"transparent",color:wk===i?"#fff":done?p.c+"88":"rgba(255,255,255,.25)",fontSize:10,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",position:"relative",transition:"all .15s"}}>
            {done&&wk!==i&&<div style={{position:"absolute",top:3,right:3,width:4,height:4,borderRadius:"50%",background:p.c+"88"}}/>}
            S{p.w}
          </button>;
        })}
      </div>
    </div>

    {/* DAY SELECTOR */}
    {(function(){
      var wd2=getWeekDates(wN);
      return<div style={{display:"flex",gap:3,marginBottom:12,overflowX:"auto"}}>
        {DAYS.map(function(d,i){
          var active=dayI===i;
          var dd=wd.ds[d.key];var dc2=false;
          if(dd){var any=false,all=true;d.exs.forEach(function(ex){if(!dd[ex.id])return;if(dd[ex.id].s.some(function(s){return s.d}))any=true;else all=false});dc2=any&&all}
          return<button key={i} onClick={function(){setDayI(i)}} style={{flex:"1 1 0",padding:"6px 2px 6px",borderRadius:12,border:active?"2px solid "+d.color:"1px solid rgba(255,255,255,.05)",background:active?d.color+"15":"transparent",cursor:"pointer",textAlign:"center",minWidth:44,position:"relative",transition:"all .15s"}}>
            {dc2&&!active&&<div style={{position:"absolute",top:4,right:4,width:5,height:5,borderRadius:"50%",background:"#10B981"}}/>}
            <div style={{fontSize:8,color:active?d.color:"rgba(255,255,255,.2)",fontWeight:800,letterSpacing:.3}}>{d.day.substring(0,3).toUpperCase()}</div>
            <div style={{fontSize:8,color:active?d.color+"99":"rgba(255,255,255,.12)",marginTop:1}}>{wd2[i]}</div>
            <div style={{fontSize:10,color:active?"#fff":"rgba(255,255,255,.3)",fontWeight:800,marginTop:1}}>{d.name}</div>
            <div style={{fontSize:7,color:active?d.color+"80":"rgba(255,255,255,.1)",marginTop:1}}>{d.label.split(" ")[0]}</div>
          </button>;
        })}
      </div>;
    })()}

    {/* SESSION HEADER */}
    <div style={{marginBottom:10,padding:"14px 16px",borderRadius:16,background:sessComplete?"rgba(16,185,129,.08)":"linear-gradient(135deg,"+day.color+"0d,"+day.color+"04)",border:"1px solid "+(sessComplete?"rgba(16,185,129,.3)":day.color+"20"),boxShadow:sessComplete?"0 4px 28px rgba(16,185,129,.1)":"none",transition:"all .4s"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
            <span style={{fontSize:22,fontWeight:900,color:sessComplete?"#10B981":day.color,letterSpacing:-.5}}>{day.name}</span>
            {isToday&&<span style={{padding:"2px 8px",borderRadius:12,background:day.color+"20",border:"1px solid "+day.color+"40",fontSize:9,fontWeight:800,color:day.color}}>AUJOURD'HUI</span>}
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>{day.label} · {day.exs.length} exercices{sessVol>0?" · "+(sessVol/1000).toFixed(1)+"t vol.":""}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:28,fontWeight:900,color:sessComplete?"#10B981":"#fff",lineHeight:1}}>{dTot>0?Math.round(dDone/dTot*100):0}<span style={{fontSize:13,color:"rgba(255,255,255,.25)",fontWeight:400}}>%</span></div>
          <div style={{fontSize:9,color:"rgba(255,255,255,.25)"}}>{dDone}/{dTot} séries</div>
        </div>
      </div>
      <MBar v={dDone} mx={dTot} c={sessComplete?"#10B981":day.color} h={5}/>
      {sessComplete&&<div style={{textAlign:"center",marginTop:10,fontSize:12,fontWeight:800,color:"#10B981",letterSpacing:.3}}>🏆 Séance terminée. Bien joué.</div>}
    </div>

    {/* REPOS MANUEL */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,padding:"5px 12px",borderRadius:10,background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.04)"}}>
      <span style={{fontSize:9,color:"rgba(255,255,255,.25)",fontWeight:700,letterSpacing:.5}}>⏱ REPOS</span>
      <div style={{display:"flex",gap:3}}>
        {REST_P.map(function(p){return<button key={p} onClick={function(){setRd(p)}} style={{padding:"3px 8px",borderRadius:6,border:rd===p?"1px solid "+day.color+"60":"1px solid rgba(255,255,255,.05)",background:rd===p?day.color+"15":"transparent",color:rd===p?day.color:"rgba(255,255,255,.2)",fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer"}}>{p>=60?Math.floor(p/60)+"m":""}:{(p%60).toString().padStart(2,"0")}</button>})}
      </div>
    </div>

    {/* EXERCISES */}
    <div style={{paddingBottom:tmr?240:0}}>
      {orderedExs.map(function(ex){
        var fI=freeExs.indexOf(ex);
        return<ExCard key={ex.id} ex={ex} data={dData[ex.id]} prev={pDData&&pDData[ex.id]?pDData[ex.id]:null} color={day.color} upd={function(f,v){upEx(ex.id,f,v)}} onDone={function(){var r=ex.rest||rd;setRd(r);setTmr(true);setTmrKey(function(k){return k+1})}} isLk={!!ex.lk} canUp={!ex.lk&&fI>0} canDn={!ex.lk&&fI>=0&&fI<freeExs.length-1} onUp={function(){reorder(day.key,ex.id,"up")}} onDn={function(){reorder(day.key,ex.id,"down")}} phaseName={ph.p} atb={getAllTimeBest(ex.id,st.wk,wN)}/>;
      })}
    </div>

    {/* MESURES */}
    <MeasCard wd={wd} pmw={pmw} upM={upM}/>

    {/* NOTES + MOOD */}
    <div style={{borderRadius:16,background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.06)",padding:"14px 16px",marginBottom:12}}>
      <div style={{fontSize:9,fontWeight:800,color:"rgba(255,255,255,.3)",textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}}>📝 SÉANCE</div>
      <div style={{display:"flex",gap:5,marginBottom:10}}>
        {MOODS.map(function(m){
          var sel=wd.mood===m.v;
          return<button key={m.v} onClick={function(){upMood(m.v)}} style={{flex:1,padding:"6px 2px",borderRadius:10,border:sel?"1px solid rgba(255,255,255,.2)":"1px solid rgba(255,255,255,.06)",background:sel?"rgba(255,255,255,.1)":"transparent",cursor:"pointer",textAlign:"center",transition:"all .15s"}}>
            <div style={{fontSize:17}}>{m.v}</div>
            <div style={{fontSize:7,color:sel?"rgba(255,255,255,.7)":"rgba(255,255,255,.25)",fontWeight:700,marginTop:2}}>{m.l}</div>
          </button>;
        })}
      </div>
      <textarea value={wd.nt} onChange={function(e){upN(e.target.value)}} placeholder="Ressenti, pump, douleurs, observations..." rows={2} style={{width:"100%",padding:"8px 10px",borderRadius:10,border:"1px solid rgba(255,255,255,.07)",background:"rgba(255,255,255,.03)",color:"#fff",fontSize:12,lineHeight:1.6,resize:"vertical",outline:"none",boxSizing:"border-box"}} onFocus={function(e){e.target.style.borderColor="rgba(255,255,255,.18)"}} onBlur={function(e){e.target.style.borderColor="rgba(255,255,255,.07)"}}/>
    </div>

    {/* EXPORT / IMPORT */}
    <div style={{display:"flex",gap:8,marginBottom:6}}>
      <button onClick={function(){
        var blob=new Blob([JSON.stringify(st,null,2)],{type:"application/json"});
        var url=URL.createObjectURL(blob);var a=document.createElement("a");
        a.href=url;a.download="colosse-S"+wN+"-"+new Date().toISOString().slice(0,10)+".json";
        a.click();URL.revokeObjectURL(url);
      }} style={{flex:1,padding:"10px",borderRadius:12,border:"1px solid rgba(16,185,129,.25)",background:"rgba(16,185,129,.07)",color:"#10B981",fontSize:11,fontWeight:800,cursor:"pointer",textAlign:"center"}}>📥 Exporter</button>
      <button onClick={function(){
        var inp=document.createElement("input");inp.type="file";inp.accept=".json";
        inp.onchange=function(e){
          var f=e.target.files[0];if(!f)return;
          var reader=new FileReader();
          reader.onload=function(ev){
            try{
              var d=JSON.parse(ev.target.result);
              if(!d.wk){alert("Fichier invalide");return}
              if(!confirm("Remplace toutes tes données. Continuer ?"))return;
              save(d);setSt(d);var cw=(d.cw||2)-1;setWk(cw);setRd(getPhaseRest(PHASES[cw].p));
              alert("Données restaurées !");
            }catch(err){alert("Erreur : "+err.message)}
          };reader.readAsText(f);
        };inp.click();
      }} style={{flex:1,padding:"10px",borderRadius:12,border:"1px solid rgba(255,255,255,.07)",background:"rgba(255,255,255,.03)",color:"rgba(255,255,255,.3)",fontSize:11,fontWeight:800,cursor:"pointer",textAlign:"center"}}>📤 Importer</button>
    </div>

    <div style={{textAlign:"center",marginTop:10,fontSize:8,color:"rgba(255,255,255,.07)",letterSpacing:1.5,textTransform:"uppercase"}}>Colosse · Transformation 2026 · Double Progression</div>

    {tmr&&<Timer key={tmrKey} sec={rd} c={day.color} onEnd={function(){setTmr(false)}} onSkip={function(){setTmr(false)}} onDC={function(d){setRd(d)}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
<script>
if('serviceWorker'in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      setInterval(function(){reg.update()},30*60*1000);
      reg.addEventListener('updatefound',function(){
        var nw=reg.installing;
        nw.addEventListener('statechange',function(){
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            var b=document.createElement('div');
            b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(90deg,#10B981,#059669);color:#fff;text-align:center;padding:12px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:800;cursor:pointer;';
            b.textContent='🔄 Mise à jour disponible — Toucher pour installer';

            document.body.appendChild(b);
